name: CI/CD Portfolio.NET

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup .NET 10 (IMPORTANT)
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      # 3. Restore + Build
      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      # 4. Tests (si tu en as)
      - name: Run Tests
        run: dotnet test --no-build --verbosity normal || echo "No tests found"
  - name: Diagnostic des secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "USERNAME est vide"; else echo "USERNAME est configuré"; fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then echo "PASSWORD est vide"; else echo "PASSWORD est configuré"; fi
      # 5. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build & Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/portfolio-net:latest
            ${{ secrets.DOCKER_USERNAME }}/portfolio-net:${{ github.sha }}
